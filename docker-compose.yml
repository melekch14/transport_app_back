services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tunisia-go-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/tunisia_go
      AUTO_MIGRATE: "true"
    ports:
      - "8080:8080"
    networks:
      - tunisia-go-net

  db:
    image: postgis/postgis:16-3.4
    container_name: tunisia-go-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tunisia_go
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tunisia_go"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - tunisia-go-net

volumes:
  pgdata:

networks:
  tunisia-go-net:
    driver: bridge
